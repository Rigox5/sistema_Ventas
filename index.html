<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Variedades Rodriguez | Acceso</title><style>

:root{--blue:#0d6efd;--sky:#2296c9;--dark:#223142;--bg:#f3f6fb;--card:#fff;--text:#182235;--muted:#6b7280;--line:#e5e7eb;--green:#16a34a;--red:#dc2626;--orange:#f97316;--purple:#7c3aed;--cyan:#06b6d4;--shadow:0 10px 25px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,#2398c9,#167cab);color:white;padding:20px 16px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.logo{width:48px;height:48px;border-radius:14px;background:white;color:var(--sky);display:grid;place-items:center;font-size:25px;font-weight:900}.brand h1{margin:0;font-size:20px}.brand p{margin:3px 0 0;font-size:13px;opacity:.9}.menu-title{font-size:12px;opacity:.8;margin:18px 8px 10px}.nav a,.nav button{width:100%;border:0;background:transparent;color:white;text-decoration:none;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;font-weight:700;cursor:pointer;margin-bottom:6px;text-align:left}.nav a.active,.nav a:hover,.nav button:hover{background:rgba(255,255,255,.18)}.sidebox{position:absolute;bottom:20px;left:16px;right:16px;background:rgba(255,255,255,.14);border-radius:14px;padding:14px;font-size:13px}.main{min-width:0}.topbar{height:68px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:var(--shadow);position:sticky;top:0;z-index:10}.hamb{font-size:24px;color:#334155}.user{font-weight:800}.content{padding:24px;display:grid;gap:22px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.stat{border-radius:6px;color:white;padding:18px;min-height:105px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}.stat b{font-size:24px;display:block;margin-bottom:8px}.stat small{font-weight:800;opacity:.95}.s1{background:#29b6f6}.s2{background:#ef5350}.s3{background:#43a047}.s4{background:#5c6bc0}.s5{background:#26a69a}.s6{background:#8bc34a}.s7{background:#ff9800}.s8{background:#78909c}.icon{font-size:34px;opacity:.9}.quick{background:white;border-radius:8px;padding:20px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.qbtn{border:none;border-radius:8px;padding:18px 14px;color:white;font-weight:900;cursor:pointer;text-align:left;font-size:15px;box-shadow:0 8px 18px rgba(0,0,0,.12)}.qbtn span{display:block;font-size:12px;margin-top:5px}.green{background:#22c55e}.blue{background:#1688f0}.purple{background:#8b5cf6}.cyan{background:#14b8c8}.orange{background:#f59e0b}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px}.panel{background:white;border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.panel h3{margin:0;font-size:18px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.panel-body{padding:18px 20px}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:13px;font-weight:800;color:#334155}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;background:white}.field input:focus,.field select:focus{outline:3px solid rgba(13,110,253,.12);border-color:#60a5fa}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:8px;padding:12px 16px;font-weight:900;cursor:pointer}.btn-primary{background:#1688f0;color:white}.btn-soft{background:#eef6ff;color:#0f5ca8;border:1px solid #d6eaff}.btn-success{background:#22c55e;color:white}.btn-danger{background:#ef4444;color:white}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}.table-wrap{overflow:auto}.table-wrap table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:13px 10px;border-bottom:1px solid #edf0f4;text-align:left;font-size:14px}th{background:#fafafa;color:#374151;font-weight:900}.empty{text-align:center;color:var(--muted);padding:28px}.pill{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:900}.ok{background:#dcfce7;color:#166534}.low{background:#fef3c7;color:#92400e}.out{background:#fee2e2;color:#991b1b}.list{display:grid;gap:10px}.list-item{border:1px solid var(--line);border-radius:8px;padding:12px;display:flex;justify-content:space-between;gap:10px}.list-item strong{display:block}.list-item small{color:var(--muted)}
@media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.sidebox{position:static;margin-top:20px}.cards{grid-template-columns:repeat(2,1fr)}.grid,.quick{grid-template-columns:1fr}}@media(max-width:700px){.content{padding:14px}.cards,.two-col{grid-template-columns:1fr}.topbar{padding:0 14px}}

body{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,#2398c9,#167cab)}.login-card{width:min(980px,100%);background:white;border-radius:12px;box-shadow:0 20px 45px rgba(0,0,0,.18);overflow:hidden;display:grid;grid-template-columns:.9fr 1.1fr}.login-side{background:linear-gradient(180deg,#2398c9,#167cab);color:white;padding:38px;display:flex;flex-direction:column;justify-content:space-between;min-height:560px}.login-side .big-logo{width:82px;height:82px;border-radius:22px;background:white;color:#2398c9;display:grid;place-items:center;font-size:42px;font-weight:900;margin-bottom:22px}.login-side h1{font-size:30px;margin:0 0 8px}.login-side p{opacity:.92;line-height:1.6}.login-info{background:rgba(255,255,255,.14);border-radius:14px;padding:16px;font-size:14px}.login-body{padding:46px;display:flex;flex-direction:column;justify-content:center}.login-body h2{margin:0;font-size:28px}.login-body .sub{font-size:15px;margin:8px 0 25px}.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:0;border-radius:7px;background:#eef6ff;color:#0f5ca8;padding:7px 10px;font-weight:800;cursor:pointer}.input-wrap{position:relative}.input-wrap input{padding-right:58px}.error{display:none;margin-top:14px;padding:12px 14px;border-radius:8px;background:#fee2e2;color:#991b1b;font-weight:800}.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.role-card{border:1px solid var(--line);border-radius:10px;padding:14px;background:#fafafa}.role-card strong{display:block;margin-bottom:5px}.role-card small{color:var(--muted)}@media(max-width:850px){.login-card{grid-template-columns:1fr}.login-side{min-height:auto}.login-body{padding:28px}.role-cards{grid-template-columns:1fr}}
</style></head><body><div class="login-card"><div class="login-side"><div><div class="big-logo">▣</div><h1>Info Ventas</h1><p>Sistema de ventas e inventario para Variedades Rodriguez.</p></div><div class="login-info"><b>Diseño actualizado</b><br>Panel moderno con menú lateral, colores claros y opciones fáciles de entender.</div></div><div class="login-body"><h2>Acceso al sistema</h2><div class="sub">Selecciona cómo deseas ingresar.</div><div class="field"><label for="clave">Clave de administrador</label><div class="input-wrap"><input id="clave" type="password" placeholder="Escribe la clave si eres administrador"><button class="toggle" type="button" onclick="toggleClave()">Ver</button></div></div><div class="actions"><button class="btn btn-primary" onclick="entrarAdmin()">Entrar como administrador</button><button class="btn btn-success" onclick="entrarEmpleado()">Entrar como empleado</button></div><div class="error" id="errorMsg">La clave es incorrecta.</div><div class="role-cards"><div class="role-card"><strong>Administrador</strong><small></small></div><div class="role-card"><strong>Empleado</strong><small></small></div></div></div></div><script>const CLAVE_ADMIN="2505";function toggleClave(){const input=document.getElementById("clave");input.type=input.type==="password"?"text":"password";}function entrarAdmin(){const clave=document.getElementById("clave").value.trim();const error=document.getElementById("errorMsg");if(clave===CLAVE_ADMIN){localStorage.setItem("rolVariedadesRodriguez","admin");window.location.href="admin.html";}else{error.style.display="block";}}function entrarEmpleado(){localStorage.setItem("rolVariedadesRodriguez","empleado");window.location.href="ventas.html";}document.getElementById("clave").addEventListener("keydown",e=>{if(e.key==="Enter")entrarAdmin();});</script></body></html>
